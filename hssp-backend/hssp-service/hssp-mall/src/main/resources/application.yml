spring:
  profiles:
    active: dev
  application:
    name: hssp-mall
  datasource:
    url: jdbc:mysql://${hssp.db.host:localhost}:3306/step_counter_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hssp.db.pw:123456}

  redis:
    host: ${hssp.redis.host:localhost}
    port: ${hssp.redis.port:6379}
    password: ${hssp.redis.pw:123456}
    database: 0
    lettuce:
      pool:
        max-active: 8 # 最大连接数
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

server:
  port: 8083 # 商城服务独立端口
  address: 0.0.0.0

mybatis-plus:
  # 只扫实体 PO，避开各模块下 DTO 的同名冲突 (如 LoginDto)
  type-aliases-package: com.hssp.model.**.po
  # 关闭 MyBatis 检查
  check-config-location: false
